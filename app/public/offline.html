<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#EAF7FF" />
    <title>พอดี — ออฟไลน์</title>
    <style>
      :root {
        color-scheme: light;
        --sky: #eaf7ff;
        --surface: #fffdf8;
        --ink: #17212b;
        --muted: #66717d;
        --line: #d7e2ea;
        --coral: #f46d5e;
        --teal: #1f9b8f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--sky);
        color: var(--ink);
        font-family:
          "IBM Plex Sans Thai",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 28px;
      }

      img {
        width: 56px;
        height: 56px;
        display: block;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 24px;
        border: 0;
        border-radius: 8px;
        background: var(--coral);
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--teal) 35%, transparent);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo/direct/pordee-logo-mark-direct-01.png" alt="พอดี" />
      <h1>ยังไม่มีอินเทอร์เน็ต</h1>
      <p>
        พอดีเก็บหน้าแอปพื้นฐานไว้แล้ว
        แต่ข้อมูลการเงินและการเข้าสู่ระบบยังต้องใช้อินเทอร์เน็ต
        ลองเชื่อมต่อใหม่แล้วกลับมาเปิดอีกครั้ง
      </p>
      <button type="button" onclick="window.location.reload()">ลองใหม่</button>
    </main>
  </body>
</html>
